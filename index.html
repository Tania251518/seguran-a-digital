<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senha Seguro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Gerador de Senha</h2>
        
        <div class="password-box">
            <input type="text" id="password" readonly placeholder="Sua senha aparecerá aqui">
            <button id="copy-btn">Copiar</button>
        </div>

        <div class="length-container">
            <label for="length">Comprimento: <span id="length-val">12</span> caracteres</label>
            <input type="range" id="length" min="6" max="30" value="12">
        </div>

        <div class="options">
            <div class="option">
                <input type="checkbox" id="uppercase" checked>
                <label for="uppercase">Letras Maiúsculas (A-Z)</label>
            </div>
            <div class="option">
                <input type="checkbox" id="lowercase" checked>
                <label for="lowercase">Letras Minúsculas (a-z)</label>
            </div>
            <div class="option">
                <input type="checkbox" id="numbers" checked>
                <label for="numbers">Números (0-9)</label>
            </div>
            <div class="option">
                <input type="checkbox" id="symbols">
                <label for="symbols">Símbolos (!@#$%^&*)</label>
            </div>
        </div>

        <button id="generate-btn">Gerar Senha</button>
    </div>

</body>
</html>
